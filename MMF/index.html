<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MMF</title>
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="back" href="../">‹ 回上一層</a>
      <h1 class="page-title">MMF</h1>
      <p class="subtext">3 個子資料夾</p>
    </div>
  </header>

  <main class="wrap page">
    <section class="card-grid" aria-label="MMF 資料夾列表">
      <a class="feature-card tone-gold" href="上端放樣/">
        <span class="card-icon" aria-hidden="true">放</span>
        <span class="card-body">
          <span class="card-title">上端放樣</span>
          <span class="card-meta">目前沒有項目</span>
        </span>
        <span class="card-arrow" aria-hidden="true">›</span>
      </a>

      <a class="feature-card tone-blue" href="上端組裝/">
        <span class="card-icon" aria-hidden="true">組</span>
        <span class="card-body">
          <span class="card-title">上端組裝</span>
          <span class="card-meta">目前沒有項目</span>
        </span>
        <span class="card-arrow" aria-hidden="true">›</span>
      </a>

      <a class="feature-card tone-green" href="桶身/">
        <span class="card-icon" aria-hidden="true">桶</span>
        <span class="card-body">
          <span class="card-title">桶身</span>
          <span class="card-meta">10 張照片</span>
        </span>
        <span class="card-arrow" aria-hidden="true">›</span>
      </a>
    </section>
  </main>

  <script>
    const navigationDelay = 500;
    const interactiveSelector = ".feature-card";

    function setPressing(activeElement) {
      if (activeElement) {
        activeElement.classList.add("is-pressing");
      }
    }

    function setActivating(activeElement) {
      if (activeElement) {
        activeElement.classList.remove("is-pressing");
        activeElement.classList.add("is-activating");
      }
    }

    function clearInteractionState() {
      document.querySelectorAll(".is-pressing, .is-activating").forEach((element) => {
        element.classList.remove("is-pressing");
        element.classList.remove("is-activating");
      });
    }

    function goAfterAnimation(path, activeElement) {
      setActivating(activeElement);

      window.setTimeout(() => {
        window.location.href = path;
      }, navigationDelay);
    }

    document.addEventListener("pointerdown", (event) => {
      const activeElement = event.target.closest(interactiveSelector);
      setPressing(activeElement);
    });

    document.addEventListener("pointerup", (event) => {
      const activeElement = event.target.closest(interactiveSelector);
      if (activeElement) {
        window.setTimeout(() => {
          if (!activeElement.classList.contains("is-activating")) {
            activeElement.classList.remove("is-pressing");
          }
        }, 80);
      }
    });

    document.addEventListener("pointercancel", clearInteractionState);
    document.addEventListener("pointerleave", (event) => {
      const activeElement = event.target.closest(interactiveSelector);
      if (activeElement && !activeElement.classList.contains("is-activating")) {
        activeElement.classList.remove("is-pressing");
      }
    });

    document.addEventListener("click", (event) => {
      const link = event.target.closest(interactiveSelector);
      if (!link) return;

      event.preventDefault();
      goAfterAnimation(link.href, link);
    });

    window.addEventListener("pageshow", clearInteractionState);
  </script>
</body>
</html>

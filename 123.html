<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角度檢測表 - 承徽機械</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #00897B, #00695C);
            color: white;
            padding: 24px 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        .header h1 {
            font-size: 26px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .header p {
            font-size: 13px;
            opacity: 0.9;
        }
        .form-section {
            background: white;
            padding: 16px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #B2DFDB;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #00897B;
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .input-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .input-row-3 .input-group {
            margin-bottom: 0;
        }
        .calculated-field {
            background: #E8F5E9;
        }
        .formula-hint {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00897B, #00695C);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn-save:active {
            transform: scale(0.98);
        }
        .table-section {
            background: white;
            margin-top: 16px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .table-header {
            background: #00897B;
            color: white;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-add {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-add:active {
            background: rgba(255,255,255,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #E0F2F1;
            padding: 10px 8px;
            font-size: 12px;
            color: #00695C;
            text-align: center;
            border-bottom: 1px solid #B2DFDB;
        }
        th:first-child {
            text-align: left;
            padding-left: 12px;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        td:first-child {
            text-align: left;
            padding-left: 12px;
            font-weight: 500;
            color: #333;
        }
        td input {
            width: 100%;
            padding: 8px;
            border: 1px solid #B2DFDB;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            background: #E8F5E9;
        }
        td input.actual {
            background: #E3F2FD;
        }
        td input.angle-input {
            background: #fff;
            text-align: left;
        }
        .error-col {
            text-align: center;
            font-weight: 600;
        }
        .error-positive {
            color: #4CAF50;
        }
        .error-negative {
            color: #f44336;
        }
        .btn-delete {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 5px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 角度檢測表</h1>
            <p>承徽機械 QC 品質管控</p>
        </div>
        
        <div class="form-section">
            <div class="input-row">
                <div class="input-group">
                    <label>專案編號</label>
                    <input type="text" id="projectNo" placeholder="請輸入專案編號">
                </div>
                <div class="input-group">
                    <label>桶身</label>
                    <input type="text" id="tankName" placeholder="請輸入桶名">
                </div>
            </div>
            
            <div class="input-row-3">
                <div class="input-group">
                    <label>圖面內徑 (mm)</label>
                    <input type="number" id="innerDiameter" placeholder="內徑" oninput="calculateOuterDiameter()">
                </div>
                <div class="input-group">
                    <label>板厚 (mm)</label>
                    <input type="number" id="plateThickness" placeholder="板厚" oninput="calculateOuterDiameter()">
                </div>
                <div class="input-group">
                    <label>圖面外徑 (mm)</label>
                    <input type="number" id="drawingOuterDiameter" class="calculated-field" placeholder="計算值" readonly>
                    <div class="formula-hint">(內徑+板厚×2) × π</div>
                </div>
            </div>
            
            <div class="input-group">
                <label>輸入實際外圓周 (mm)</label>
                <input type="number" id="actualCircumference" placeholder="請輸入實際外圓周" oninput="calculateAll()">
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <span>測量資料</span>
                <button class="btn-add" onclick="addCustomRow()">➕ 新增角度</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>角度</th>
                        <th>標準圓周數值</th>
                        <th>輸入實際圓周</th>
                        <th>誤差</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                </tbody>
            </table>
        </div>

        <button class="btn-save" onclick="saveAndSend()">📧 儲存並發送 Mail</button>
        
        <div class="footer">
            承徽機械有限公司 © 2026
        </div>
    </div>

    <script>
        // 預設角度列表
        const defaultAngles = [45, 90, 135, 180, 225, 270, 315];
        let customAngleCount = 0;
        
        // 初始化表格
        function initTable() {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            
            defaultAngles.forEach((angle, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${angle}°</td>
                    <td class="standard-value" id="standard_${index}">-</td>
                    <td><input type="number" class="actual" id="actual_${index}" placeholder="輸入" oninput="calculateError(${index})"></td>
                    <td class="error-col" id="error_${index}">-</td>
                `;
                tbody.appendChild(row);
            });
            
            // 加入2個自訂列
            for (let i = 0; i < 2; i++) {
                addCustomRow();
            }
        }
        
        // 計算圖面外徑 = (內徑 + 板厚×2) × π
        function calculateOuterDiameter() {
            const innerD = parseFloat(document.getElementById('innerDiameter').value) || 0;
            const thickness = parseFloat(document.getElementById('plateThickness').value) || 0;
            const outerD = (innerD + (thickness * 2)) * Math.PI;
            document.getElementById('drawingOuterDiameter').value = outerD.toFixed(2);
        }
        
        // 計算所有標準值（使用「輸入實際外圓周」）
        function calculateAll() {
            const actualC = parseFloat(document.getElementById('actualCircumference').value) || 0;
            
            // 計算預設角度
            defaultAngles.forEach((angle, index) => {
                const standard = Math.round(actualC / 360 * angle);
                document.getElementById(`standard_${index}`).textContent = standard;
            });
            
            // 計算所有自訂角度
            for (let i = 0; i < customAngleCount; i++) {
                const customIndex = defaultAngles.length + i;
                const angleInput = document.getElementById(`angle_${customIndex}`);
                if (angleInput && angleInput.value) {
                    const angle = parseFloat(angleInput.value) || 0;
                    const standard = Math.round(actualC / 360 * angle);
                    document.getElementById(`standard_${customIndex}`).textContent = standard;
                    calculateError(customIndex);
                }
            }
        }
        
        // 新增自訂角度列
        function addCustomRow() {
            const tbody = document.getElementById('dataTable');
            const customIndex = defaultAngles.length + customAngleCount;
            customAngleCount++;
            
            const row = document.createElement('tr');
            row.id = `row_${customIndex}`;
            row.innerHTML = `
                <td>
                    <input type="number" class="angle-input" id="angle_${customIndex}" placeholder="角度°" style="width:60px; background:#fff;" oninput="calculateCustomStandard(${customIndex})">
                    <button class="btn-delete" onclick="deleteRow(${customIndex})">✕</button>
                </td>
                <td class="standard-value" id="standard_${customIndex}">-</td>
                <td><input type="number" class="actual" id="actual_${customIndex}" placeholder="輸入" oninput="calculateError(${customIndex})"></td>
                <td class="error-col" id="error_${customIndex}">-</td>
            `;
            tbody.appendChild(row);
        }
        
        // 刪除列
        function deleteRow(index) {
            const row = document.getElementById(`row_${index}`);
            if (row) {
                row.remove();
            }
        }
        
        // 計算自訂角度的標準值
        function calculateCustomStandard(index) {
            const actualC = parseFloat(document.getElementById('actualCircumference').value) || 0;
            const angleInput = document.getElementById(`angle_${index}`);
            const angle = parseFloat(angleInput.value) || 0;
            
            const standard = Math.round(actualC / 360 * angle);
            document.getElementById(`standard_${index}`).textContent = standard;
            
            calculateError(index);
        }
        
        // 計算誤差
        function calculateError(index) {
            const standardEl = document.getElementById(`standard_${index}`);
            const actualEl = document.getElementById(`actual_${index}`);
            const errorEl = document.getElementById(`error_${index}`);
            
            const standard = parseFloat(standardEl.textContent) || 0;
            const actual = parseFloat(actualEl.value) || 0;
            const error =  actual - standard;
            
            if (standard === 0 || isNaN(standard) || isNaN(actual)) {
                errorEl.textContent = '-';
                errorEl.className = 'error-col';
            } else {
                const absError = Math.abs(error);
                const sign = error >= 0 ? '+' : '-';
                errorEl.textContent = `${sign}${absError.toFixed(2)}`;
                // 大於標準（誤差為正）= 綠色+，小於標準（誤差為負）= 紅色-
                errorEl.className = 'error-col ' + (error >= 0 ? 'error-positive' : 'error-negative');
            }
        }
        
        // 儲存並發送郵件
        function saveAndSend() {
            const projectNo = document.getElementById('projectNo').value || '(未填寫)';
            const tankName = document.getElementById('tankName').value || '(未填寫)';
            const innerD = document.getElementById('innerDiameter').value || '0';
            const thickness = document.getElementById('plateThickness').value || '0';
            const drawingOD = document.getElementById('drawingOuterDiameter').value || '0';
            const actualC = document.getElementById('actualCircumference').value || '0';
            
            let emailBody = `角度檢測資料\n`;
            emailBody += `==================\n`;
            emailBody += `專案編號: ${projectNo}\n`;
            emailBody += `桶身: ${tankName}\n`;
            emailBody += `圖面內徑: ${innerD} mm\n`;
            emailBody += `板厚: ${thickness} mm\n`;
            emailBody += `圖面外徑: ${drawingOD} mm\n`;
            emailBody += `輸入實際外圓周: ${actualC} mm\n`;
            emailBody += `==================\n\n`;
            emailBody += `角度\t標準圓周數值\t輸入實際圓周\t誤差\n`;
            emailBody += `--------------------------------------------\n`;
            
            // 預設角度
            defaultAngles.forEach((angle, index) => {
                const standard = document.getElementById(`standard_${index}`).textContent;
                const actual = document.getElementById(`actual_${index}`).value || '-';
                const error = document.getElementById(`error_${index}`).textContent;
                emailBody += `${angle}°\t${standard}\t\t${actual}\t\t${error}\n`;
            });
            
            // 自訂角度
            for (let i = 0; i < customAngleCount; i++) {
                const customIndex = defaultAngles.length + i;
                const row = document.getElementById(`row_${customIndex}`);
                if (row) {
                    const angle = document.getElementById(`angle_${customIndex}`).value || '-';
                    const standard = document.getElementById(`standard_${customIndex}`).textContent;
                    const actual = document.getElementById(`actual_${customIndex}`).value || '-';
                    const error = document.getElementById(`error_${customIndex}`).textContent;
                    if (angle !== '-') {
                        emailBody += `${angle}°\t${standard}\t\t${actual}\t\t${error}\n`;
                    }
                }
            }
            
            emailBody += `\n==================\n`;
            emailBody += `檢測時間: ${new Date().toLocaleString('zh-TW')}\n`;
            emailBody += `==================\n`;
            
            const subject = `[角度檢測] ${projectNo} - ${tankName}`;
            const mailtoLink = `mailto:qc@chmc.com.tw?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
            
            window.location.href = mailtoLink;
        }
        
        // 初始化
        initTable();
    </script>
</body>
</html>

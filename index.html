<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>資料夾目錄</title>
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body>
  <header class="hero">
    <div class="wrap hero-inner">
      <div>
        <p class="eyebrow">Measurement Library</p>
        <h1>範例目錄</h1>
        <form class="search-panel" role="search" aria-label="搜尋資料夾">
          <div class="search-box">
            <input id="folder-search" type="search" placeholder="輸入 ACF、CP、MMF、桶身..." autocomplete="off">
            <button type="submit">搜尋</button>
          </div>
          <div class="search-results" id="search-results" aria-live="polite"></div>
        </form>
      </div>
      <div class="stat-panel" aria-label="資料夾數量">
        <span class="stat-number" id="folder-count">0</span>
        <span class="stat-label">資料夾</span>
      </div>
    </div>
  </header>

  <main class="wrap page">
    <section class="section-head">
      <div>
        <p class="eyebrow">Categories</p>
        <h2>分類</h2>
      </div>
    </section>

    <section id="folder-cards" class="card-grid" aria-label="資料夾清單"></section>
  </main>

  <script src="/data/folders.js"></script>
  <script src="/assets/site.js"></script>
  <script>
    const searchForm = document.querySelector(".search-panel");
    const searchInput = document.querySelector("#folder-search");
    const searchResults = document.querySelector("#search-results");
    const folderCards = document.querySelector("#folder-cards");
    const folderCount = document.querySelector("#folder-count");

    function getMatches(query) {
      const keyword = query.trim().toLowerCase();
      if (!keyword) return [];

      return folders.filter((folder) =>
        folder.name.toLowerCase().includes(keyword) ||
        folder.path.toLowerCase().includes(keyword)
      );
    }

    function renderResults(matches, query) {
      if (!query.trim()) {
        searchResults.innerHTML = "";
        return;
      }

      if (matches.length === 0) {
        searchResults.innerHTML = '<p class="search-empty">找不到符合的資料夾</p>';
        return;
      }

      searchResults.innerHTML = matches.map((folder) => `
        <a class="search-result" href="${folder.path}">
          <span>${folder.name}</span>
          <small>${folder.detail}</small>
        </a>
      `).join("");
    }

    function isRootFolder(folder) {
      return folder.path.split("/").filter(Boolean).length === 1;
    }

    function getChildFolderCount(folder) {
      return folders.filter((item) => item.path.startsWith(folder.path) && item.path !== folder.path).length;
    }

    function renderCards() {
      const rootFolders = folders.filter(isRootFolder);
      folderCount.textContent = rootFolders.length;

      const toneClasses = ["tone-gold", "tone-blue", "tone-green", "tone-cyan", "tone-magenta"];
      folderCards.innerHTML = rootFolders.map((folder, index) => {
        const childCount = getChildFolderCount(folder);
        const detail = childCount > 0 ? `${childCount} 個細部資料夾` : folder.detail;
        const tone = toneClasses[index % toneClasses.length];
        const icon = folder.name.charAt(0);

        return `
          <a class="feature-card ${tone}" href="${folder.path}">
            <span class="card-icon" aria-hidden="true">${icon}</span>
            <span class="card-body">
              <span class="card-title">${folder.name}</span>
              <span class="card-meta">${detail}</span>
            </span>
            <span class="card-arrow" aria-hidden="true">›</span>
          </a>
        `;
      }).join("");
    }

    renderCards();

    searchInput.addEventListener("input", () => {
      renderResults(getMatches(searchInput.value), searchInput.value);
    });

    searchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const matches = getMatches(searchInput.value);
      if (matches.length > 0) {
        window.location.href = matches[0].path;
      }
    });
  </script>
</body>
</html>
